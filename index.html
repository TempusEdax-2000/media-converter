<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro AI Media Suite</title>
    <script src="coi-serviceworker.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    <style>
        :root { --accent: #00e676; --bg: #121212; --card: #1e1e1e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background: var(--card); padding: 25px; border-radius: 15px; width: 100%; max-width: 500px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: var(--accent); margin-top: 0; font-size: 1.5rem; }
        .section { margin-bottom: 20px; text-align: left; background: #252525; padding: 15px; border-radius: 10px; }
        label { display: block; font-size: 0.8rem; color: #aaa; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        select, input, button { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #333; color: white; font-size: 1rem; margin-top: 5px; box-sizing: border-box; }
        input[type="range"] { padding: 0; accent-color: var(--accent); }
        button { background: var(--accent); color: #000; font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        button:disabled { background: #444; color: #888; }
        #log { font-family: monospace; font-size: 11px; background: #000; padding: 10px; border-radius: 5px; height: 120px; overflow-y: auto; color: #00ff00; margin-top: 15px; border: 1px solid #333; white-space: pre-wrap; word-wrap: break-word; }
        .progress-container { height: 6px; background: #333; border-radius: 3px; margin-top: 10px; display: none; }
        #progress { height: 100%; background: var(--accent); width: 0%; transition: width 0.2s; }
    </style>
</head>
<body>

<div class="container">
    <h2>Advanced Converter</h2>
    
    <div class="section">
        <label>1. Select Source File</label>
        <input type="file" id="fileIn">
    </div>

    <div class="section">
        <label>2. Target Format</label>
        <select id="targetFormat">
            <optgroup label="Video">
                <option value="mp4">MP4 (H.264 High Profile)</option>
                <option value="webm">WebM (VP9 Engine)</option>
                <option value="mov">MOV (QuickTime)</option>
                <option value="mpg">MPG (MPEG-2)</option>
                <option value="gif">Animated GIF</option>
            </optgroup>
            <optgroup label="Audio">
                <option value="mp3">MP3 (High Quality)</option>
                <option value="aac">AAC</option>
                <option value="m4a">M4A</option>
                <option value="wav">WAV</option>
                <option value="ogg">OGG</option>
            </optgroup>
            <optgroup label="Image">
                <option value="webp">WebP</option>
            </optgroup>
        </select>
    </div>

    <div class="section">
        <label>3. Quality Intelligence</label>
        <input type="range" id="quality" min="1" max="51" value="23">
        <div style="display:flex; justify-content:space-between; font-size:10px; color:#888;">
            <span>High Quality</span>
            <span>Smallest File</span>
        </div>
    </div>

    <button id="goBtn">Start Conversion</button>

    <div class="progress-container" id="pCont">
        <div id="progress"></div>
    </div>

    <div id="log">Status: Ready</div>
</div>

<script>
    const { createFFmpeg, fetchFile } = FFmpeg;
    
    // Explicit Core Path to prevent the 'Loading' hang
    const ffmpeg = createFFmpeg({ 
        log: true,
        corePath: 'https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.11.0/dist/ffmpeg-core.js'
    });

    const logBox = document.getElementById('log');
    const writeLog = (msg) => {
        logBox.innerHTML += `<br>> ${msg}`;
        logBox.scrollTop = logBox.scrollHeight;
    };

    document.getElementById('goBtn').onclick = async () => {
        const file = document.getElementById('fileIn').files[0];
        const fmt = document.getElementById('targetFormat').value;
        const qual = document.getElementById('quality').value;
        
        if (!file) {
            alert("Please select a file first.");
            return;
        }

        document.getElementById('goBtn').disabled = true;
        document.getElementById('pCont').style.display = 'block';

        try {
            if (!ffmpeg.isLoaded()) {
                writeLog("Initializing AI Core... (may take 10-20s)");
                await ffmpeg.load();
            }

            writeLog("Reading source file...");
            ffmpeg.FS('writeFile', 'input_file', await fetchFile(file));

            let args = ['-i', 'input_file'];

            // Intelligent logic for formats
            if (['mp4', 'mov', 'webm'].includes(fmt)) {
                args.push('-preset', 'ultrafast', '-crf', qual, '-c:a', 'aac');
            } else if (fmt === 'mp3') {
                args.push('-q:a', '2'); 
            } else if (fmt === 'gif') {
                args.push('-vf', 'fps=10,scale=480:-1:flags=lanczos');
            }

            const outputName = `converted_file.${fmt}`;
            args.push(outputName);

            writeLog("Starting conversion process...");
            
            ffmpeg.setProgress(({ ratio }) => {
                document.getElementById('progress').style.width = (ratio * 100) + '%';
            });

            await ffmpeg.run(...args);
            
            writeLog("Finalizing download...");
            const data = ffmpeg.FS('readFile', outputName);
            const url = URL.createObjectURL(new Blob([data.buffer]));
            
            const link = document.createElement('a');
            link.href = url;
            link.download = outputName;
            link.click();
            
            writeLog("SUCCESS! File saved.");
        } catch (e) {
            writeLog("ERROR: " + e.message);
            console.error(e);
        }

        document.getElementById('goBtn').disabled = false;
    };
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Media Converter</title>
    <script src="coi-serviceworker.js"></script>
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding: 20px; }
        .box { background: #1e1e1e; padding: 20px; border-radius: 15px; border: 2px solid #333; }
        select, button, input { width: 100%; margin: 10px 0; padding: 15px; border-radius: 8px; border: none; }
        button { background: #00e676; font-weight: bold; cursor: pointer; }
        #log { font-size: 12px; color: #888; text-align: left; background: black; padding: 10px; height: 100px; overflow: scroll; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Mobile Media Converter</h2>
        <input type="file" id="uploader">
        <select id="format">
            <option value="mp4">to MP4 (Video)</option>
            <option value="mp3">to MP3 (Audio)</option>
            <option value="gif">to GIF (Image)</option>
            <option value="wav">to WAV (Audio)</option>
            <option value="webm">to WebM (Video)</option>
        </select>
        <button id="startBtn">Convert & Download</button>
        <div id="log">Logs will appear here...</div>
    </div>

    <script>
        const { createFFmpeg, fetchFile } = FFmpeg;
        const ffmpeg = createFFmpeg({ log: true });

        document.getElementById('startBtn').onclick = async () => {
            const file = document.getElementById('uploader').files[0];
            const format = document.getElementById('format').value;
            if (!file) return alert("Select a file first!");

            const log = document.getElementById('log');
            log.innerHTML = "Loading engine...";

            if (!ffmpeg.isLoaded()) await ffmpeg.load();

            log.innerHTML += "<br>Processing file...";
            ffmpeg.FS('writeFile', 'input', await fetchFile(file));
            
            await ffmpeg.run('-i', 'input', `output.${format}`);

            const data = ffmpeg.FS('readFile', `output.${format}`);
            const url = URL.createObjectURL(new Blob([data.buffer]));
            
            const a = document.createElement('a');
            a.href = url;
            a.download = `converted.${format}`;
            a.click();
            log.innerHTML += "<br>Done! Downloading...";
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Converter Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ffmpeg/0.11.6/ffmpeg.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 20px; text-align: center; }
        .card { background: #2a2a2a; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        select, input, button { width: 100%; margin: 10px 0; padding: 12px; border-radius: 8px; border: none; font-size: 16px; box-sizing: border-box; }
        button { background: #00e676; font-weight: bold; cursor: pointer; }
        #log { background: #000; color: #0f0; padding: 10px; height: 120px; overflow-y: auto; text-align: left; font-size: 12px; font-family: monospace; border: 1px solid #444; margin-top: 10px; }
        .status-dot { height: 10px; width: 10px; background: red; border-radius: 50%; display: inline-block; margin-right: 5px; }
    </style>
</head>
<body>

<div class="card">
    <h3>Media Converter</h3>
    <div style="margin-bottom: 15px; font-size: 14px;">
        <span id="dot" class="status-dot"></span> Engine: <span id="status">Offline</span>
    </div>
    
    <button id="loadBtn" style="background: #2196F3; color: white;">1. Initialize Engine</button>
    
    <hr style="border: 0.5px solid #444; margin: 20px 0;">
    
    <input type="file" id="fileInput">
    <select id="outFormat">
        <option value="webp">to WebP</option>
        <option value="mp4">to MP4</option>
        <option value="mp3">to MP3</option>
        <option value="gif">to GIF</option>
    </select>
    
    <button id="convertBtn" disabled>2. Convert File</button>
    <div id="log">Logs...</div>
</div>

<script>
    const { createFFmpeg, fetchFile } = FFmpeg;
    const log = document.getElementById('log');
    const writeLog = (m) => { log.innerHTML += `<br>> ${m}`; log.scrollTop = log.scrollHeight; };

    // Set corePath directly to a stable source
    const ffmpeg = createFFmpeg({
        log: true,
        corePath: 'https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.11.0/dist/ffmpeg-core.js'
    });

    // Step 1: Load the Engine separately
    document.getElementById('loadBtn').onclick = async () => {
        writeLog("Requesting system memory...");
        try {
            await ffmpeg.load();
            document.getElementById('status').innerText = "Online (Ready)";
            document.getElementById('dot').style.backgroundColor = "#00e676";
            document.getElementById('convertBtn').disabled = false;
            document.getElementById('loadBtn').style.display = "none";
            writeLog("Engine initialized successfully.");
        } catch (e) {
            writeLog("FAILED to load. Reason: " + e.message);
            writeLog("TIP: If you see 'SharedArrayBuffer' error, your browser is blocking the high-speed engine.");
        }
    };

    // Step 2: Handle Conversion
    document.getElementById('convertBtn').onclick = async () => {
        const file = document.getElementById('fileInput').files[0];
        const fmt = document.getElementById('outFormat').value;
        if (!file) return alert("Select a file first!");

        writeLog("Processing " + file.name);
        try {
            ffmpeg.FS('writeFile', 'input', await fetchFile(file));
            await ffmpeg.run('-i', 'input', `out.${fmt}`);
            
            const data = ffmpeg.FS('readFile', `out.${fmt}`);
            const url = URL.createObjectURL(new Blob([data.buffer]));
            const a = document.createElement('a');
            a.href = url;
            a.download = `converted_file.${fmt}`;
            a.click();
            writeLog("Download triggered!");
        } catch (e) {
            writeLog("Conversion Error: " + e.message);
        }
    };
</script>
</body>
</html>

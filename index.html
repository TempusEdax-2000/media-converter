<script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>

<script>
    // Updated Setup Logic
    const { createFFmpeg, fetchFile } = FFmpeg;
    
    // We add a 'corePath' to ensure it finds the engine correctly
    const ffmpeg = createFFmpeg({ 
        log: true,
        corePath: 'https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.11.0/dist/ffmpeg-core.js'
    });

    const logBox = document.getElementById('log');
    const writeLog = (msg) => {
        logBox.innerHTML += `<br>> ${msg}`;
        logBox.scrollTop = logBox.scrollHeight;
    };

    document.getElementById('goBtn').onclick = async () => {
        try {
            const file = document.getElementById('fileIn').files[0];
            if (!file) return alert("Select a file!");

            document.getElementById('goBtn').disabled = true;
            
            if (!ffmpeg.isLoaded()) {
                writeLog("Attempting to wake up AI Engine...");
                await ffmpeg.load();
                writeLog("Engine Awake!");
            }
            
            // ... rest of your conversion code ...
        } catch (err) {
            writeLog("CRITICAL ERROR: " + err.message);
            console.error(err);
        }
    };
</script>

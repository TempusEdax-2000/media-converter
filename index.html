<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro AI Media Suite</title>
    <script src="coi-serviceworker.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    <style>
        :root { --accent: #00e676; --bg: #121212; --card: #1e1e1e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background: var(--card); padding: 25px; border-radius: 15px; width: 100%; max-width: 500px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: var(--accent); margin-top: 0; font-size: 1.5rem; }
        .section { margin-bottom: 20px; text-align: left; background: #252525; padding: 15px; border-radius: 10px; }
        label { display: block; font-size: 0.8rem; color: #aaa; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        select, input, button { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #333; color: white; font-size: 1rem; margin-top: 5px; box-sizing: border-box; }
        button { background: var(--accent); color: #000; font-weight: bold; cursor: pointer; margin-top: 20px; }
        button:disabled { background: #444; color: #888; }
        #log { font-family: monospace; font-size: 11px; background: #000; padding: 10px; border-radius: 5px; height: 150px; overflow-y: auto; color: #00ff00; margin-top: 15px; border: 1px solid #333; white-space: pre-wrap; }
    </style>
</head>
<body>

<div class="container">
    <h2>Advanced Converter</h2>
    <div class="section">
        <label>1. Select Source File</label>
        <input type="file" id="fileIn">
    </div>
    <div class="section">
        <label>2. Target Format</label>
        <select id="targetFormat">
            <option value="webp">WebP (Optimized)</option>
            <option value="mp4">MP4</option>
            <option value="mp3">MP3</option>
            <option value="gif">GIF</option>
            <option value="png">PNG</option>
        </select>
    </div>
    <button id="goBtn">Start Conversion</button>
    <div id="log">Status: Ready. (If it fails, refresh page once)</div>
</div>

<script>
    const { createFFmpeg, fetchFile } = FFmpeg;
    
    // We use a slightly older, more stable core for mobile memory compatibility
    const ffmpeg = createFFmpeg({ 
        log: true,
        corePath: 'https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.11.0/dist/ffmpeg-core.js'
    });

    const logBox = document.getElementById('log');
    const writeLog = (msg) => {
        logBox.innerHTML += `<br>> ${msg}`;
        logBox.scrollTop = logBox.scrollHeight;
    };

    document.getElementById('goBtn').onclick = async () => {
        const file = document.getElementById('fileIn').files[0];
        const fmt = document.getElementById('targetFormat').value;
        if (!file) return alert("Select file");

        document.getElementById('goBtn').disabled = true;

        try {
            if (!ffmpeg.isLoaded()) {
                writeLog("Loading engine... this uses ~100MB RAM");
                await ffmpeg.load();
            }

            writeLog("Processing...");
            ffmpeg.FS('writeFile', 'input', await fetchFile(file));

            // Standard conversion command
            await ffmpeg.run('-i', 'input', `output.${fmt}`);

            const data = ffmpeg.FS('readFile', `output.${fmt}`);
            const url = URL.createObjectURL(new Blob([data.buffer]));
            
            const a = document.createElement('a');
            a.href = url;
            a.download = `converted.${fmt}`;
            a.click();
            writeLog("SUCCESS!");
        } catch (e) {
            writeLog("MEMORY ERROR: Try refreshing the page. Mobile browsers often require a 'fresh' start to allocate media memory.");
            console.error(e);
        }
        document.getElementById('goBtn').disabled = false;
    };
</script>
</body>
</html>
